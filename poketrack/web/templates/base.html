<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ t('app.title') }} — {{ t('app.subtitle') }}</title>
  <meta name="description" content="{{ t('app.subtitle') }}">
  <meta property="og:title" content="{{ t('app.title') }}">
  <meta property="og:description" content="{{ t('app.subtitle') }}">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">

  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
  <meta name="theme-color" content="{{ palette.bg }}">
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icons/icon-32.png') }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192.png') }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/icon-180.png') }}">

  <!--
    Tailwind via the Play CDN — no Node build step required. The "midnight"
    colour scale below is injected straight from poketrack/gui/theme.py, so the
    web UI shares the exact same Midnight Blue palette as the desktop UI.
  -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            midnight: {
              bg:           '{{ palette.bg }}',
              bgAlt:        '{{ palette.bg_alt }}',
              surface:      '{{ palette.surface }}',
              surfaceAlt:   '{{ palette.surface_alt }}',
              border:       '{{ palette.border }}',
              primary:      '{{ palette.primary }}',
              primaryHover: '{{ palette.primary_hover }}',
              accent:       '{{ palette.accent }}',
              text:         '{{ palette.text }}',
              muted:        '{{ palette.text_muted }}',
              faint:        '{{ palette.text_faint }}',
              success:      '{{ palette.success }}',
              warning:      '{{ palette.warning }}',
              danger:       '{{ palette.danger }}'
            }
          },
          fontFamily: {
            sans: ['Segoe UI', 'system-ui', 'Roboto', 'Helvetica', 'Arial', 'sans-serif']
          }
        }
      }
    }
  </script>

  <!-- Same hex values exposed as CSS variables for custom styles. -->
  <style>
    :root {
      {% for key, value in palette.items() %}--mn-{{ key | replace('_', '-') }}: {{ value }};
      {% endfor %}
    }
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-midnight-bg text-midnight-text font-sans min-h-dvh antialiased flex flex-col">
  {% if update %}
    <a href="{{ update.url }}" target="_blank" rel="noopener"
       class="block text-center text-sm bg-midnight-primary/15 border-b border-midnight-primary/40
              text-midnight-accent hover:bg-midnight-primary/25 px-4 py-2 transition-colors">
      ⬆ {{ t('update.available', version=update.version) }} →
    </a>
  {% endif %}

  <div class="flex-1">{% block content %}{% endblock %}</div>

  <footer class="border-t border-midnight-border mt-8">
    <div class="max-w-6xl mx-auto px-6 py-5 flex flex-wrap items-center justify-center gap-4 text-sm">
      <a href="{{ github_profile_url }}" target="_blank" rel="noopener"
         class="inline-flex items-center gap-2 text-midnight-muted hover:text-midnight-text rounded-lg px-3 py-2
                border border-midnight-border hover:bg-midnight-surfaceAlt transition-colors">
        <img src="{{ url_for('static', filename='icons/github-profile.png') }}" alt="" width="20" height="20" class="rounded-full">
        {{ t('footer.github') }}
      </a>
      <a href="{{ discord_url }}" target="_blank" rel="noopener"
         class="inline-flex items-center gap-2 text-midnight-muted hover:text-midnight-text rounded-lg px-3 py-2
                border border-midnight-border hover:bg-midnight-surfaceAlt transition-colors">
        <img src="{{ url_for('static', filename='icons/discord.png') }}" alt="" width="20" height="20" class="rounded">
        {{ t('footer.discord') }}
      </a>
      <span class="text-midnight-faint">{{ t('footer.made_by') }}</span>
    </div>
  </footer>
  <!-- TypeScript front-end, compiled by Vite (web-frontend/) to a stable path. -->
  <script type="module" src="{{ url_for('static', filename='dist/app.js') }}"></script>
</body>
</html>
