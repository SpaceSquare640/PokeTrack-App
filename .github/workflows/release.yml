name: Release Build

# When a GitHub Release is published, build the standalone Windows desktop
# executable(s) and attach them to that release.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build the native extension (Rust) and the app deps
        run: |
          python -m pip install --upgrade pip maturin pyinstaller
          pip install -r requirements.txt
          # Build the abi3 wheel and install it so PyInstaller bundles the fast path.
          maturin build --release --manifest-path poketrack-native/Cargo.toml --out dist-wheels
          pip install --find-links dist-wheels poketrack-native

      - name: Build executable
        run: pyinstaller --noconfirm PokeTrack.spec

      - name: Attach PokeTrack.exe + native wheel to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/PokeTrack.exe
            dist-wheels/*.whl

  # Native desktop shell (Tauri) — builds the sidecar-bundled NSIS installer and
  # attaches it to the release. Runs in parallel with windows-exe (self-contained).
  tauri-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build the native extension + server sidecar
        run: |
          python -m pip install --upgrade pip maturin pyinstaller
          pip install -r requirements.txt
          maturin build --release --manifest-path poketrack-native/Cargo.toml --out dist-wheels
          pip install --find-links dist-wheels poketrack-native
          pyinstaller --noconfirm --distpath dist-server --workpath build-server PokeTrack-server.spec
          New-Item -ItemType Directory -Force -Path desktop/src-tauri/binaries | Out-Null
          Copy-Item dist-server/poketrack-server.exe desktop/src-tauri/binaries/poketrack-server.exe

      - name: Install desktop deps and build the installer
        working-directory: desktop
        run: |
          npm ci
          npm run build

      - name: Attach the installer to the release
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/src-tauri/target/release/bundle/nsis/*.exe
