name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Pure-Python matrix — proves the app (and its graceful fallback) works with
  # NO Rust toolchain installed, on both platforms the app actually ships for.
  # The native parity test self-skips here.
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests (pure Python)
        run: python -m pytest -q

  # Native job — builds the Rust extension, installs it, and runs the suite so
  # the native fast path + the native/Python parity test are exercised in CI, on
  # both platforms (Windows is the platform the shipped wheel actually targets).
  # Also enforces the cargo fmt/clippy hygiene documented in the wiki.
  native:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo fmt --check
        working-directory: poketrack-native
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: poketrack-native
        run: cargo clippy --release --all-targets -- -D warnings

      - name: Build + install the native extension
        run: |
          python -m pip install --upgrade pip maturin
          pip install ./poketrack-native

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests (with native fast path)
        run: python -m pytest -q

  # Front-end job — type-check and build the TypeScript bundle so a TS error or
  # broken build fails CI. The compiled bundle is committed; this guards it.
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-frontend/package-lock.json

      - name: Install + type-check + build
        working-directory: web-frontend
        run: |
          npm ci
          npm run build

  # Desktop shell job — compiles the Tauri (Rust) desktop app on every push/PR,
  # so a break in desktop/src-tauri surfaces here instead of at release time.
  # Windows-only (the app only ships for Windows: NSIS installer, WebView2).
  desktop-shell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo fmt --check
        working-directory: desktop/src-tauri
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: desktop/src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo build (compile check)
        working-directory: desktop/src-tauri
        run: cargo build
